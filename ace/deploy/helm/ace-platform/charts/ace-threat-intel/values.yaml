replicaCount: 1

image:
  repository: ghcr.io/ace-platform/ace-threat-intel
  tag: "latest"
  pullPolicy: IfNotPresent

port: 8091

redis:
  addr: "ace-redis-master:6379"
  password: ""
  db: 1

iocCacheTtl: "24h"
syncInterval: "6h"

# Optional feed API keys
otxApiKey: ""
taxiiServer: ""
taxiiUser: ""
taxiiPass: ""

podAnnotations: {}

podSecurityContext:
  runAsNonRoot: true
  runAsUser: 65534

securityContext:
  allowPrivilegeEscalation: false
  readOnlyRootFilesystem: true
  capabilities:
    drop: ["ALL"]

resources:
  requests:
    cpu: "50m"
    memory: "64Mi"
  limits:
    cpu: "200m"
    memory: "256Mi"

serviceAccount:
  create: true
  name: ""

service:
  type: ClusterIP
  port: 8091

affinity: {}
