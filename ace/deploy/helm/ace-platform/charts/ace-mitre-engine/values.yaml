replicaCount: 1

image:
  repository: ghcr.io/ace-platform/ace-mitre-engine
  tag: "latest"
  pullPolicy: IfNotPresent

port: 8090

database:
  url: "postgres://ace:ace@ace-postgresql:5432/ace_mitre?sslmode=disable"

syncOnStart: false
frameworks:
  - enterprise
  - ics

podAnnotations: {}

podSecurityContext:
  runAsNonRoot: true
  runAsUser: 65534

securityContext:
  allowPrivilegeEscalation: false
  readOnlyRootFilesystem: true
  capabilities:
    drop: ["ALL"]

resources:
  requests:
    cpu: "100m"
    memory: "128Mi"
  limits:
    cpu: "500m"
    memory: "512Mi"

serviceAccount:
  create: true
  name: ""

service:
  type: ClusterIP
  port: 8090

affinity: {}
