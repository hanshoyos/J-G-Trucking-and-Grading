apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "ace-mitre-engine.fullname" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "ace-mitre-engine.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      {{- include "ace-mitre-engine.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "ace-mitre-engine.selectorLabels" . | nindent 8 }}
      annotations:
        {{- toYaml .Values.podAnnotations | nindent 8 }}
    spec:
      serviceAccountName: {{ include "ace-mitre-engine.serviceAccountName" . }}
      securityContext:
        {{- toYaml .Values.podSecurityContext | nindent 8 }}
      {{- with .Values.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      containers:
        - name: ace-mitre-engine
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          securityContext:
            {{- toYaml .Values.securityContext | nindent 12 }}
          env:
            - name: ACE_MITRE_PORT
              value: {{ .Values.port | quote }}
            - name: ACE_MITRE_DATABASE_URL
              value: {{ .Values.database.url | quote }}
            - name: ACE_MITRE_SYNC_ON_START
              value: {{ .Values.syncOnStart | quote }}
            - name: ACE_MITRE_FRAMEWORKS
              value: {{ join "," .Values.frameworks | quote }}
          ports:
            - name: http
              containerPort: {{ .Values.port }}
              protocol: TCP
          livenessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 20
            periodSeconds: 30
          readinessProbe:
            httpGet:
              path: /readyz
              port: http
            initialDelaySeconds: 15
            periodSeconds: 10
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
