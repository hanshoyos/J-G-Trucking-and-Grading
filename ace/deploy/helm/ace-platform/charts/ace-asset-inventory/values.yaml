replicaCount: 1

image:
  repository: ghcr.io/ace-platform/ace-asset-inventory
  tag: "latest"
  pullPolicy: IfNotPresent

port: 8092

database:
  url: "postgres://ace:ace@ace-postgresql:5432/ace_assets?sslmode=disable"

kafka:
  brokers: "ace-kafka:9092"
  normalizedTopic: "ace.events.normalized"
  consumerGroup: "ace-asset-inventory"

# Optional Purdue Model subnet overrides (CIDR notation)
purdue:
  level0Subnets: []
  level1Subnets: []
  level2Subnets: []
  level3Subnets: []

podAnnotations: {}

podSecurityContext:
  runAsNonRoot: true
  runAsUser: 65534

securityContext:
  allowPrivilegeEscalation: false
  readOnlyRootFilesystem: true
  capabilities:
    drop: ["ALL"]

resources:
  requests:
    cpu: "100m"
    memory: "128Mi"
  limits:
    cpu: "500m"
    memory: "512Mi"

serviceAccount:
  create: true
  name: ""

service:
  type: ClusterIP
  port: 8092

affinity: {}
