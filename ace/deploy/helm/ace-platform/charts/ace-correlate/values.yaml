replicaCount: 2

image:
  repository: ghcr.io/ace-platform/ace-correlate
  tag: "latest"
  pullPolicy: IfNotPresent

tenantId: "default"
kafkaBrokers: "ace-kafka:9092"

kafka:
  normalizedTopic: "ace.events.normalized"
  enrichedTopic: "ace.events.enriched"
  alertsTopic: "ace.alerts"
  consumerGroup: "ace-correlate"

engine:
  rulesDir: "/etc/ace-correlate/rules"
  windowGcIntervalSecs: 60
  maxWindowEvents: 10000

podAnnotations: {}

podSecurityContext:
  runAsNonRoot: true
  runAsUser: 1000
  fsGroup: 1000

securityContext:
  allowPrivilegeEscalation: false
  readOnlyRootFilesystem: true
  capabilities:
    drop: ["ALL"]

resources:
  requests:
    cpu: "200m"
    memory: "256Mi"
  limits:
    cpu: "1000m"
    memory: "1Gi"

autoscaling:
  enabled: true
  minReplicas: 2
  maxReplicas: 8
  targetCPUUtilizationPercentage: 70

affinity: {}

serviceAccount:
  create: true
  name: ""

service:
  type: ClusterIP
  port: 8082
