apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "ace-normalize.fullname" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "ace-normalize.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      {{- include "ace-normalize.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "ace-normalize.selectorLabels" . | nindent 8 }}
      annotations:
        {{- toYaml .Values.podAnnotations | nindent 8 }}
    spec:
      serviceAccountName: {{ include "ace-normalize.serviceAccountName" . }}
      securityContext:
        {{- toYaml .Values.podSecurityContext | nindent 8 }}
      {{- with .Values.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      containers:
        - name: ace-normalize
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          securityContext:
            {{- toYaml .Values.securityContext | nindent 12 }}
          env:
            - name: ACE_NORMALIZE__TENANT_ID
              value: {{ .Values.tenantId | quote }}
            - name: ACE_NORMALIZE__KAFKA__BROKERS
              value: {{ .Values.kafkaBrokers | quote }}
            - name: ACE_NORMALIZE__KAFKA__RAW_TOPIC
              value: {{ .Values.kafka.rawTopic | quote }}
            - name: ACE_NORMALIZE__KAFKA__NORMALIZED_TOPIC
              value: {{ .Values.kafka.normalizedTopic | quote }}
            - name: ACE_NORMALIZE__KAFKA__CONSUMER_GROUP
              value: {{ .Values.kafka.consumerGroup | quote }}
            {{- if .Values.geoipDbPath }}
            - name: ACE_NORMALIZE__GEOIP_DB_PATH
              value: {{ .Values.geoipDbPath | quote }}
            {{- end }}
          ports:
            - name: health
              containerPort: 8081
              protocol: TCP
          livenessProbe:
            httpGet:
              path: /healthz
              port: health
            initialDelaySeconds: 15
            periodSeconds: 20
          readinessProbe:
            httpGet:
              path: /readyz
              port: health
            initialDelaySeconds: 10
            periodSeconds: 10
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
          volumeMounts:
            - name: tmp
              mountPath: /tmp
      volumes:
        - name: tmp
          emptyDir: {}
