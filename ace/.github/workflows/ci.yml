name: ACE Platform CI

on:
  push:
    branches: ["main", "claude/**"]
    paths:
      - "ace/**"
  pull_request:
    branches: ["main"]
    paths:
      - "ace/**"

defaults:
  run:
    working-directory: ace

# ─────────────────────────────────────────────────────────────
#  Lint + test Rust services
# ─────────────────────────────────────────────────────────────
jobs:
  rust-check:
    name: Rust (check / clippy / test)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt

      - name: Cache cargo registry
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: "ace -> target"

      - name: Install librdkafka build deps
        run: |
          sudo apt-get update
          sudo apt-get install -y cmake libssl-dev pkg-config libsasl2-dev

      - name: cargo fmt check
        run: cargo fmt --all -- --check

      - name: cargo clippy (pedantic)
        run: >
          cargo clippy --all-targets --all-features --
          -D warnings
          -W clippy::pedantic
          -A clippy::module_name_repetitions
          -A clippy::must_use_candidate

      - name: cargo test
        run: cargo test --all --all-features

  # ─────────────────────────────────────────────────────────────
  #  Build Rust release binaries (validates linkage)
  # ─────────────────────────────────────────────────────────────
  rust-build:
    name: Rust (release build)
    runs-on: ubuntu-latest
    needs: rust-check
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo registry
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: "ace -> target"

      - name: Install build deps
        run: |
          sudo apt-get update
          sudo apt-get install -y cmake libssl-dev pkg-config libsasl2-dev

      - name: cargo build --release
        run: cargo build --release --all

  # ─────────────────────────────────────────────────────────────
  #  Lint + test Go operator
  # ─────────────────────────────────────────────────────────────
  go-check:
    name: Go (vet / lint / test)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.22"
          cache: true
          cache-dependency-path: ace/services/ace-operator/go.sum

      - name: go vet
        run: go vet ./...
        working-directory: ace/services/ace-operator

      - name: golangci-lint
        uses: golangci/golangci-lint-action@v6
        with:
          version: latest
          working-directory: ace/services/ace-operator
          args: "--timeout=5m"

      - name: go test
        run: go test ./... -race -coverprofile=coverage.out
        working-directory: ace/services/ace-operator

  # ─────────────────────────────────────────────────────────────
  #  Validate Helm charts
  # ─────────────────────────────────────────────────────────────
  helm-lint:
    name: Helm lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Helm
        uses: azure/setup-helm@v4
        with:
          version: "3.15.0"

      - name: Helm lint ace-ingest
        run: helm lint ace/deploy/helm/ace-platform/charts/ace-ingest

      - name: Helm lint ace-normalize
        run: helm lint ace/deploy/helm/ace-platform/charts/ace-normalize

      - name: Helm lint ace-operator
        run: helm lint ace/deploy/helm/ace-platform/charts/ace-operator

      - name: Helm lint ace-correlate
        run: helm lint ace/deploy/helm/ace-platform/charts/ace-correlate

      - name: Helm lint ace-mitre-engine
        run: helm lint ace/deploy/helm/ace-platform/charts/ace-mitre-engine

      - name: Helm lint ace-threat-intel
        run: helm lint ace/deploy/helm/ace-platform/charts/ace-threat-intel

      - name: Helm lint ace-asset-inventory
        run: helm lint ace/deploy/helm/ace-platform/charts/ace-asset-inventory

      - name: Helm template smoke test (ace-ingest)
        run: |
          helm template smoke \
            ace/deploy/helm/ace-platform/charts/ace-ingest \
            --set kafkaBrokers=kafka:9092 \
            --set tenantId=test \
            | kubectl apply --dry-run=client -f -
        env:
          KUBECONFIG: /dev/null

      - name: Helm template smoke test (ace-correlate)
        run: |
          helm template smoke \
            ace/deploy/helm/ace-platform/charts/ace-correlate \
            --set kafkaBrokers=kafka:9092 \
            | kubectl apply --dry-run=client -f -
        env:
          KUBECONFIG: /dev/null

  # ─────────────────────────────────────────────────────────────
  #  Proto validation
  # ─────────────────────────────────────────────────────────────
  proto-lint:
    name: Protobuf lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install buf
        uses: bufbuild/buf-setup-action@v1

      - name: buf lint
        run: buf lint
        working-directory: ace/proto

  # ─────────────────────────────────────────────────────────────
  #  Docker build (no push on PRs — just validate images build)
  # ─────────────────────────────────────────────────────────────
  docker-build:
    name: Docker build (${{ matrix.service }})
    runs-on: ubuntu-latest
    needs: [rust-build, go-check]
    if: github.event_name == 'push'
    strategy:
      matrix:
        service:
          - ace-ingest
          - ace-normalize
          - ace-operator
          - ace-correlate
          - ace-mitre-engine
          - ace-threat-intel
          - ace-asset-inventory
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build image (no push)
        uses: docker/build-push-action@v6
        with:
          context: ace/services/${{ matrix.service }}
          push: false
          tags: ghcr.io/ace-platform/${{ matrix.service }}:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
